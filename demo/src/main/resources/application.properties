# =====================================================
# IT Asset Management System - Application Properties
# I-configure dito ang lahat ng settings ng application
# =====================================================

# Pangalan ng application
spring.application.name=it-asset-management-system

# =====================================================
# DATABASE CONFIGURATION - H2 (Lightweight Database)
# Ito ay file-based - mase-save ang data sa "it_asset_db" folder
# Hindi mo na kailangan mag-install ng kahit ano!
# =====================================================
spring.datasource.url=jdbc:h2:file:./data/it_asset_db
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=password
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# =====================================================
# H2 CONSOLE SETTINGS
# Pwede mong makita ang database sa: http://localhost:8080/h2-console
# =====================================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console
spring.h2.console.settings.web-allow-others=true

# =====================================================
# JPA / HIBERNATE SETTINGS
# =====================================================
# I-show ang SQL queries sa console (para sa debugging)
spring.jpa.show-sql=true

# Auto-format ng SQL para mas madaling basahin
spring.jpa.properties.hibernate.format_sql=true

# update = automatic na mag-create/alter ng tables base sa entities
spring.jpa.hibernate.ddl-auto=update

# =====================================================
# SERVER SETTINGS
# =====================================================
server.port=8080

# =====================================================
# LOGGING SETTINGS
# =====================================================
logging.level.org.springframework.security=INFO
logging.level.com.example.demo=DEBUG
